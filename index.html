<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Form</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="w-50 m-auto my-5">

  <!-- Inputs -->
  <input type="text" class="form-control my-3 text-center" placeholder="Product Name"id="productName">
  <input type="number" class="form-control my-3 text-center" placeholder="Price" id="productPrice">
  <input type="text" class="form-control my-3 text-center" placeholder="Category"   id="productCategory">
  <textarea class="form-control my-3 text-center" placeholder="Description" id="productDescription"></textarea>
  <input type="text" class="form-control my-4 text-center" placeholder="search.."   id="search"  oninput ="searchProduct()" >

  <!-- Button -->
  <button id ="updata" class ="btn btn-primary w-100 my-3" onclick="submitProduct()">Submit</button>
  <button id ="Editdata" class ="btn btn-primary w-100 my-3" onclick="Editdata()">updata</button>
  <!-- Table -->
  <table class="table table-striped text-center mt-4">
    <thead>
      <tr>
        <th>id</th>
        <th>Name</th>
        <th>Price</th>
        <th>Category</th>
        <th>Description</th>
        <th  colspan="2">Actions</th>
      </tr>
      
    </thead>




    <tbody  id="row">
    
     
    </tbody>
    
  </table>
 
</div>
<script src="CRUD.js"></script>
<!-- <script src="project.js"></script> -->
</body>
</html>
